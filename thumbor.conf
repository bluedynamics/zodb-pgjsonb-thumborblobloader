import os

# Use zodb-pgjsonb blob loader
LOADER = "zodb_pgjsonb_thumborblobloader.loader"

# Handler lists — healthcheck must come first so /healthcheck/? is matched before Url.regex()
HANDLER_LISTS = ["thumbor.handler_lists.healthcheck"]
if os.environ.get("PGTHUMBOR_PLONE_AUTH_URL"):
    HANDLER_LISTS.append("zodb_pgjsonb_thumborblobloader.auth_handler")

# Security
SECURITY_KEY = os.environ.get("THUMBOR_SECURITY_KEY", "CHANGE-ME")
ALLOW_UNSAFE_URL = os.environ.get("ALLOW_UNSAFE_URL", "False").lower() == "true"

# Storage (Thumbor result cache — file-based for simplicity)
RESULT_STORAGE = "thumbor.result_storages.file_storage"
RESULT_STORAGE_FILE_STORAGE_ROOT_PATH = os.environ.get(
    "RESULT_STORAGE_PATH", "/tmp/thumbor/result_storage"
)

# PostgreSQL connection
PGTHUMBOR_DSN = os.environ.get("PGTHUMBOR_DSN", "")

# Connection pool
PGTHUMBOR_POOL_MIN_SIZE = int(os.environ.get("PGTHUMBOR_POOL_MIN_SIZE", "1"))
PGTHUMBOR_POOL_MAX_SIZE = int(os.environ.get("PGTHUMBOR_POOL_MAX_SIZE", "4"))

# Disk cache
PGTHUMBOR_CACHE_DIR = os.environ.get("PGTHUMBOR_CACHE_DIR", "")
PGTHUMBOR_CACHE_MAX_SIZE = int(os.environ.get("PGTHUMBOR_CACHE_MAX_SIZE", "0"))

# S3 fallback
PGTHUMBOR_S3_BUCKET = os.environ.get("PGTHUMBOR_S3_BUCKET", "")
PGTHUMBOR_S3_REGION = os.environ.get("PGTHUMBOR_S3_REGION", "us-east-1")
PGTHUMBOR_S3_ENDPOINT = os.environ.get("PGTHUMBOR_S3_ENDPOINT", "")

# Plone auth: internal URL (bypasses nginx to avoid loops and reduce latency)
PGTHUMBOR_PLONE_AUTH_URL = os.environ.get("PGTHUMBOR_PLONE_AUTH_URL", "")
PGTHUMBOR_AUTH_CACHE_TTL = int(os.environ.get("PGTHUMBOR_AUTH_CACHE_TTL", "60"))

# Cache-Control headers (only effective when auth_handler is loaded)
# Authenticated (3-segment) URLs: browser-only caching, no proxy caching
PGTHUMBOR_CACHE_CONTROL_AUTHENTICATED = os.environ.get(
    "PGTHUMBOR_CACHE_CONTROL_AUTHENTICATED", "private, max-age=86400"
)
# Public (2-segment) URLs: empty = use Thumbor's default (max-age + public)
PGTHUMBOR_CACHE_CONTROL_PUBLIC = os.environ.get(
    "PGTHUMBOR_CACHE_CONTROL_PUBLIC", ""
)
