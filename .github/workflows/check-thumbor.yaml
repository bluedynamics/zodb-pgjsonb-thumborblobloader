---
name: Check Thumbor Release

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 6:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/bluedynamics/zodb-pgjsonb-thumborblobloader

jobs:
  check:
    name: Check for new Thumbor version
    runs-on: ubuntu-latest
    steps:
      - name: Get latest Thumbor version from PyPI
        id: pypi
        run: |
          VERSION=$(curl -sf https://pypi.org/pypi/thumbor/json | jq -r .info.version)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest Thumbor on PyPI: ${VERSION}"

      - name: Check if image with this Thumbor version exists
        id: check
        run: |
          # List existing tags and check if any start with thumbor-<version>
          EXISTING=$(docker manifest inspect "${{ env.IMAGE }}:thumbor-${{ steps.pypi.outputs.version }}_loader-latest" 2>/dev/null && echo "yes" || echo "no")
          if [ "$EXISTING" = "no" ]; then
            # Also check with a wildcard-like approach: list all tags
            TAGS=$(curl -sf \
              -H "Authorization: Bearer $(echo ${{ secrets.GITHUB_TOKEN }} | base64)" \
              "https://ghcr.io/v2/bluedynamics/zodb-pgjsonb-thumborblobloader/tags/list" 2>/dev/null \
              | jq -r '.tags[]?' 2>/dev/null || echo "")
            if echo "$TAGS" | grep -q "thumbor-${{ steps.pypi.outputs.version }}_"; then
              EXISTING="yes"
            fi
          fi
          echo "exists=${EXISTING}" >> "$GITHUB_OUTPUT"
          echo "Image exists for Thumbor ${{ steps.pypi.outputs.version }}: ${EXISTING}"

      - name: Trigger rebuild if new version
        if: steps.check.outputs.exists == 'no'
        run: |
          echo "New Thumbor version ${{ steps.pypi.outputs.version }} detected — triggering rebuild"
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker.yaml/dispatches" \
            -d '{"ref":"main"}'
