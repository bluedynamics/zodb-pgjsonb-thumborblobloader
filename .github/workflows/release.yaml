---
name: Build & upload PyPI package

on:
  # Build dev package after CI passes on main (no duplicate test runs)
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Build & verify package
    # Skip if triggered by workflow_run and CI failed
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@v2

  release-test-pypi:
    name: Publish in-dev package to test.pypi.org
    environment: release-test-pypi
    if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - build-package
    permissions:
      id-token: write

    steps:
      - name: Download packages built by build-and-inspect-python-package
        uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist

      - name: Upload package to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release-pypi:
    name: Publish released package to pypi.org
    environment: release-pypi
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    needs:
      - build-package
    permissions:
      id-token: write

    steps:
      - name: Download packages built by build-and-inspect-python-package
        uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist

      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: Build & push Docker image
    if: github.event.action == 'published'
    needs:
      - release-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/bluedynamics/zodb-pgjsonb-thumborblobloader

    steps:
      - uses: actions/checkout@v4

      - name: Determine versions
        id: versions
        run: |
          LOADER_VERSION="${GITHUB_REF_NAME#v}"
          echo "loader=${LOADER_VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "- Loader: ${LOADER_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for PyPI index propagation
        run: |
          for i in $(seq 1 12); do
            if pip index versions zodb-pgjsonb-thumborblobloader 2>/dev/null | grep -q "${{ steps.versions.outputs.loader }}"; then
              echo "Version ${{ steps.versions.outputs.loader }} available on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI index (attempt $i/12)..."
            sleep 10
          done
          echo "::warning::Version not yet visible on PyPI after 2 minutes, proceeding anyway"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.loader }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LOADER_VERSION=${{ steps.versions.outputs.loader }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
