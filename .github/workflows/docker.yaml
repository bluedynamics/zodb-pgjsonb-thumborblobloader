---
name: Docker Image

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/bluedynamics/zodb-pgjsonb-thumborblobloader

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine versions
        id: versions
        run: |
          THUMBOR_VERSION=$(curl -sf https://pypi.org/pypi/thumbor/json | jq -r .info.version)
          echo "thumbor=${THUMBOR_VERSION}" >> "$GITHUB_OUTPUT"

          # Loader version from git describe (matches hatch-vcs)
          LOADER_VERSION=$(git describe --tags --always 2>/dev/null | sed 's/^v//')
          if [ -z "$LOADER_VERSION" ]; then
            LOADER_VERSION="0.0.0"
          fi
          echo "loader=${LOADER_VERSION}" >> "$GITHUB_OUTPUT"

          echo "### Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "- Thumbor: ${THUMBOR_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Loader: ${LOADER_VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=thumbor-${{ steps.versions.outputs.thumbor }}_loader-${{ steps.versions.outputs.loader }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
